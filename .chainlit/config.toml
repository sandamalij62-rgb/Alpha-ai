[project]
# ඇප් එකේ නම
name = "Alpha AI"

# මෙය true කළ විට අකුරු ලියන ආකාරය (streaming) පෙනේ
enable_telemetry = false

[UI]
# වෙබ් පිටුවේ නම (Browser tab එකේ පෙනෙන නම)
name = "Alpha AI - The Future"

# ඇප් එකේ තේමාව (Dark mode එකට සුපිරියට පේනවා)
default_theme = "dark"

# චැට් එක පටන් ගන්න කොට මුලින්ම README එක පෙන්වීමට
show_readme_as_default = true

# --- ලාංඡනය (Logo) සඳහා වන කොටස ---
# මම ඔබ වෙනුවෙන් සකස් කළ ලස්සන රොබෝ ලෝගෝ එකක ලින්ක් එක මෙතනට එක් කළා
favicon_url = "https://api.dicebear.com/7.x/bottts/svg?seed=Alpha&backgroundColor=00BFFF"
logo_url = "https://api.dicebear.com/7.x/bottts/svg?seed=Alpha&backgroundColor=00BFFF"
# --------------------------------

[theme]
# මෙතනින් පාටවල් වෙනස් කරන්න පුළුවන් (Blue & Silver theme)
primary = "#00BFFF"
background = "#0D1117"

[theme.light]
primary = "#00BFFF"
background = "#F0F2F5"

[theme.dark]
primary = "#00BFFF"
background = "#0D1117"
